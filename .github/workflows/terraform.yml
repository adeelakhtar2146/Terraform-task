name: "Terraform EKS CI/CD"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.7.0"
  # Agar manual trigger ho toh input use karein, warna default 'dev' (ya PR logic ke liye)
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }} 
  AWS_ACCOUNT_ID: "723626972500"

jobs:
  terraform:
    name: "Terraform Action"
    runs-on: ubuntu-latest
    
    defaults:
      run:
        # Ensure karein ke aapka terraform code isi folder mein hai
        working-directory: ./environments/${{ env.ENVIRONMENT }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-EKS-${{ github.run_id }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=adeel-eks-tf-state" \
            -backend-config="key=${{ env.ENVIRONMENT }}/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=terraform-locking" \
            -backend-config="encrypt=true" \
            -reconfigure

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file="terraform.tfvars" -out=tfplan

      - name: Terraform Apply
        # Apply tab chalega jab main branch par push ho ya manual 'apply' select kiya jaye
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        # Sirf manual trigger par 'destroy' chalane ki ijazat hai
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: terraform destroy -var-file="terraform.tfvars" -auto-approve